<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;" />
  <title>Quick Create</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/theme-light.css" id="theme-light" />
  <link rel="stylesheet" href="css/theme-dark.css" id="theme-dark" disabled />
  <link rel="stylesheet" href="css/spotlight.css" />
</head>
<body class="spotlight-body">
  <div id="spotlight">
    <div id="spotlight-header">New Issue</div>
    <form id="spotlight-form">
      <input id="issue-title" type="text" placeholder="Title *" autocomplete="off" />
      <div class="row-two">
        <select id="project-select"><option value="">Project *</option></select>
        <select id="tracker-select"><option value="">Tracker</option></select>
      </div>
      <select id="assignee-select" disabled><option value="">Assignee (select project first)</option></select>
      <textarea id="issue-desc" placeholder="Description (optional)" rows="2"></textarea>
      <div id="attachment-list"></div>
      <div class="spotlight-actions">
        <button id="btn-clipboard" type="button">Paste screenshot</button>
        <label id="btn-file-label" for="file-input">Attach files</label>
        <input id="file-input" type="file" multiple accept="image/*,.pdf,.txt,.zip" />
        <button id="btn-cancel" type="button">Cancel</button>
        <button id="btn-submit" type="button">Create</button>
      </div>
    </form>
  </div>
  <script type="module" src="js/spotlight.js"></script>
</body>
</html>
